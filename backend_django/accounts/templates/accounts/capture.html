<div class="capture-container" style="text-align: center; max-width: 600px; margin: auto;">
    
    <div id="message-area" style="margin-bottom: 15px; min-height: 40px;">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}" style="padding: 10px; border-radius: 4px; color: #fff; background-color: {% if message.tags == 'error' %}#dc3545{% else %}#28a745{% endif %};">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    </div>

    <h2>Face Enrollment for {{ user.username }}</h2>
    <p id="instruction-text">To ensure security, we need to verify you are a live person. Please follow the instruction below.</p>
    
    <div style="position: relative; display: inline-block;">
        <video id="video" width="100%" height="auto" autoplay style="border: 2px solid #ccc; border-radius: 8px;"></video>
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px dashed rgba(255,255,255,0.5); border-radius: 50%; width: 200px; height: 250px; pointer-events: none;"></div>
    </div>

    <p id="challenge-text" style="font-size: 1.2em; font-weight: bold; margin-top: 10px; color: #dc3545;"></p>

    {% csrf_token %}
    <button type="button" id="start-liveness" style="padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px;">Start Liveness Check</button>
    
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const startLivenessBtn = document.getElementById('start-liveness');
    const challengeText = document.getElementById('challenge-text');
    const instructionText = document.getElementById('instruction-text');
    const messageArea = document.getElementById('message-area');
    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

    const challenges = [
        { type: 'head_turn_left', text: 'Slowly turn your head to the LEFT' },
        { type: 'head_turn_right', text: 'Slowly turn your head to the RIGHT' },
    ];

    async function initCamera() {
        try {
            // Request a standard resolution, but the canvas will downscale it
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: { ideal: 1280 }, height: { ideal: 720 } } 
            });
            video.srcObject = stream;
        } catch (err) {
            displayMessage("Camera access denied or not found.", 'error');
        }
    }

    function displayMessage(message, type = 'error') {
        const color = type === 'error' ? '#dc3545' : '#28a745';
        messageArea.innerHTML = `<div style="padding: 10px; border-radius: 4px; color: #fff; background-color: ${color};">${message}</div>`;
    }

    function resetUI() {
        startLivenessBtn.innerText = "Start Liveness Check";
        startLivenessBtn.disabled = false;
        challengeText.innerText = '';
        instructionText.innerText = 'To ensure security, we need to verify you are a live person. Please follow the instruction below.';
    }

    startLivenessBtn.addEventListener('click', async () => {
        messageArea.innerHTML = '';
        const randomChallenge = challenges[Math.floor(Math.random() * challenges.length)];
        challengeText.innerText = randomChallenge.text;
        
        startLivenessBtn.innerText = "Capturing...";
        startLivenessBtn.disabled = true;

        const frames = [];
        const context = canvas.getContext('2d');
        const captureInterval = 250; // Slightly faster interval
        const frameCount = 5;

        for (let i = 0; i < frameCount; i++) {
            instructionText.innerText = `Capturing frame ${i + 1} of ${frameCount}...`;
            await new Promise(resolve => setTimeout(resolve, captureInterval));
            // --- OPTIMIZATION: Draw to a smaller canvas before encoding ---
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            frames.push(canvas.toDataURL('image/jpeg', 0.85)); // Use slightly higher quality for smaller image
        }
        
        instructionText.innerText = 'Capture complete. Sending to server...';
        startLivenessBtn.innerText = "Processing...";
        challengeText.innerText = "Verifying liveness... This should be quick.";

        const formData = new FormData();
        formData.append('csrfmiddlewaretoken', csrfToken);
        formData.append('image_frames', JSON.stringify(frames));
        formData.append('challenge_type', randomChallenge.type);

        try {
            const response = await fetch(window.location.href, {
                method: 'POST',
                body: formData,
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            });

            const contentType = response.headers.get("content-type");
            if (!contentType || !contentType.includes("application/json")) {
                throw new Error("Invalid response from server. Your session may have expired. Please refresh the page.");
            }

            if (!response.ok) {
                throw new Error(`Server responded with an error: ${response.status}`);
            }

            const data = await response.json();

            if (data.success) {
                displayMessage('Enrollment successful! Redirecting...', 'success');
                window.location.href = data.redirect_url;
            } else {
                displayMessage(data.message || 'An unknown error occurred.', 'error');
                resetUI();
            }
        } catch (error) {
            console.error('Fetch Error:', error);
            displayMessage(error.message || 'A network or server error occurred. Please check the console and try again.', 'error');
            resetUI();
        }
    });

    initCamera();
</script>
